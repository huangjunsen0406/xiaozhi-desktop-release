<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="releases.title">Releases - Xiaozhi Desktop</title>
    <script src="js/i18n.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap');

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000;
            color: #fff;
        }

        .tech-border {
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tech-border:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.03);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        .loading-spinner {
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .release-row {
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            transition: background 0.2s;
        }
        .release-row:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .expand-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .expand-content.open {
            max-height: 600px;
        }

        .chevron-icon {
            transition: transform 0.3s;
        }
        .chevron-icon.open {
            transform: rotate(180deg);
        }

        .download-link {
            color: #9ca3af;
            transition: color 0.2s;
        }
        .download-link:hover {
            color: #3b82f6;
        }
    </style>
</head>
<body class="antialiased selection:bg-blue-500/30 min-h-screen flex flex-col">

    <!-- 顶部导航 -->
    <nav class="fixed w-full z-50 top-0 mix-blend-difference text-white py-6 px-8 flex justify-between items-center bg-black/50 backdrop-blur-sm border-b border-white/5">
        <div class="text-lg font-bold tracking-tighter flex items-center gap-2">
            <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition">
                <div class="w-3 h-3 bg-white rounded-full"></div>
                Xiaozhi Desktop <span class="text-xs opacity-50 border border-white/30 px-1 rounded">PRO</span>
            </a>
        </div>
        <div class="flex gap-6 text-sm font-medium tracking-wide">
            <a href="index.html#overview" class="opacity-60 hover:opacity-100 transition" data-i18n="nav.overview">概览</a>
            <a href="index.html#capabilities" class="opacity-60 hover:opacity-100 transition" data-i18n="nav.capabilities">核心能力</a>
            <a href="download.html" class="opacity-60 hover:opacity-100 transition" data-i18n="nav.download">下载</a>
            <a href="#" class="opacity-100 border-b border-white pb-0.5 text-blue-400 border-blue-400 transition" data-i18n="nav.releases">历史版本</a>
            <button id="lang-toggle" onclick="I18N.toggleLang()" class="opacity-60 hover:opacity-100 transition border border-white/20 px-2 py-0.5 rounded text-xs">EN</button>
        </div>
    </nav>

    <main class="flex-grow pt-32 px-4 relative overflow-hidden">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[400px] bg-purple-900/8 rounded-full blur-[120px] pointer-events-none"></div>

        <div class="max-w-4xl mx-auto relative z-10">
            <!-- Header -->
            <div class="flex items-start justify-between mb-16">
                <div>
                    <h1 class="text-4xl md:text-5xl font-bold mb-4 tracking-tight">
                        Xiaozhi Desktop<br>
                        <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">Releases</span>
                    </h1>
                    <p class="text-gray-500 max-w-lg text-sm leading-relaxed" data-i18n="releases.subtitle">
                        下载历史版本。默认推荐使用最新版本以获得最佳体验。
                    </p>
                </div>
                <a href="https://github.com/huangjunsen0406/xiaozhi-desktop-release/releases" target="_blank"
                   class="hidden md:flex items-center gap-2 px-5 py-2.5 rounded-full border border-white/20 text-sm font-medium hover:bg-white/5 transition mt-2">
                    <span data-i18n="releases.changelog">View changelog</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                </a>
            </div>

            <!-- Release List -->
            <div id="release-list" class="mb-24">
                <div class="flex items-center justify-center py-20">
                    <div class="loading-spinner"></div>
                    <span class="ml-3 text-gray-600 text-sm" data-i18n="releases.loading">正在加载版本列表...</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-12 border-t border-white/10 text-center bg-black z-10">
        <p class="text-gray-600 text-xs font-mono" data-i18n="footer.copyright">
            &copy; 2025 Xiaozhi Desktop. Built with Electron & Passion.
        </p>
    </footer>

    <script>
        const REPO = 'huangjunsen0406/xiaozhi-desktop-release'
        const API_URL = `https://api.github.com/repos/${REPO}/releases`

        const PLATFORM_ICONS = {
            mac: `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.21-1.96 1.07-3.11-1.05.05-2.31.74-3.03 1.59-.67.79-1.25 2.05-1.09 3.2 1.17.09 2.36-.84 3.05-1.68z"/></svg>`,
            win: `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M0 3.449L9.75 2.1v9.451H0m10.949-9.602L24 0v11.4H10.949M0 12.6h9.75v9.451L0 20.699M10.949 12.6H24V24l-12.9-1.801"/></svg>`,
            linux: `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12.504 0c-.155 0-.311.001-.465.003-.653.014-1.274.092-1.854.253-.754.21-1.394.543-1.907.998-.573.507-.994 1.152-1.263 1.933-.242.7-.358 1.5-.358 2.399v.122c.007.792.075 1.485.204 2.073.137.63.347 1.147.618 1.555.084.124.178.254.283.388l.008.012a2.467 2.467 0 01.278.477c.08.186.127.393.127.622 0 .26-.065.48-.186.66a1.548 1.548 0 01-.473.423c-.349.214-.622.5-.821.848-.178.31-.295.657-.352 1.04-.026.176-.04.359-.04.547 0 .496.104.967.305 1.409.141.31.325.596.55.855l.022.025.007.009c.056.065.117.132.183.2.393.402.636.833.736 1.293.052.238.08.49.08.756 0 .277-.03.544-.087.799a3.395 3.395 0 01-.235.665c-.13.266-.26.483-.383.654l-.024.032c-.172.222-.32.412-.444.574-.248.324-.378.604-.378.837 0 .136.05.264.14.376.103.128.25.228.438.3.302.117.698.178 1.186.178.33 0 .692-.03 1.082-.088.3-.044.613-.102.937-.172.234-.05.48-.109.735-.174a7.07 7.07 0 001.093-.379c.293-.13.532-.277.717-.44.278-.245.423-.525.423-.838 0-.083-.009-.163-.028-.24a1.14 1.14 0 00-.134-.312c-.088-.141-.14-.289-.155-.445-.011-.109-.008-.225.008-.346.028-.207.102-.397.223-.57.185-.264.42-.481.702-.65.188-.113.392-.2.612-.26.15-.04.304-.066.463-.078l.031-.002c.252-.014.504-.02.757-.02.157 0 .315.003.472.01.22.008.432.027.639.056.44.063.827.181 1.162.354.336.173.582.386.738.637.108.174.17.362.186.562.013.157-.01.314-.065.47-.06.174-.104.32-.13.44-.031.146-.047.292-.047.436 0 .312.145.593.422.838.185.163.424.31.717.44.37.164.74.29 1.107.382.227.057.463.11.707.16.337.07.66.128.972.174.394.058.76.088 1.097.088.476 0 .862-.061 1.158-.178a.914.914 0 00.442-.3.493.493 0 00.139-.376c0-.233-.13-.513-.378-.837a8.372 8.372 0 01-.444-.574l-.024-.032a3.443 3.443 0 01-.383-.654 3.395 3.395 0 01-.235-.665 3.248 3.248 0 01-.087-.799c0-.266.028-.518.08-.756.1-.46.343-.891.736-1.293.066-.068.127-.135.183-.2l.007-.009.022-.025c.225-.259.409-.545.55-.855.201-.442.305-.913.305-1.409 0-.188-.014-.37-.04-.547a2.52 2.52 0 00-.352-1.04 2.144 2.144 0 00-.821-.848 1.548 1.548 0 01-.473-.423.982.982 0 01-.186-.66c0-.229.047-.436.127-.622a2.467 2.467 0 01.278-.477l.008-.012c.105-.134.199-.264.283-.388.271-.408.481-.925.618-1.555.129-.588.197-1.281.204-2.073v-.122c0-.899-.116-1.699-.358-2.399-.269-.781-.69-1.426-1.263-1.933-.513-.455-1.153-.788-1.907-.998a7.29 7.29 0 00-1.854-.253A18.86 18.86 0 0012.504 0z"/></svg>`,
        }

        const DOWNLOAD_ICON = `<svg class="w-4 h-4 mr-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>`

        function classifyAssets(assets) {
            const result = { mac: [], win: [], linux: [] }
            for (const a of assets) {
                const n = a.name.toLowerCase()
                if (n.endsWith('.dmg')) {
                    result.mac.push({ label: I18N.t('releases.mac.dmg'), url: a.browser_download_url })
                } else if (n.endsWith('.exe')) {
                    result.win.push({ label: I18N.t('releases.win.exe'), url: a.browser_download_url })
                } else if (n.endsWith('.appimage')) {
                    result.linux.push({ label: I18N.t('releases.linux.appimage'), url: a.browser_download_url })
                } else if (n.endsWith('.deb')) {
                    result.linux.push({ label: I18N.t('releases.linux.deb'), url: a.browser_download_url })
                }
            }
            return result
        }

        function renderPlatformColumn(icon, title, links) {
            if (links.length === 0) return ''
            const linksHtml = links.map(l =>
                `<a href="${l.url}" class="download-link flex items-center text-sm py-1.5">${DOWNLOAD_ICON}${l.label}</a>`
            ).join('')
            return `
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-3 text-white font-medium text-sm">
                        ${icon} ${title}
                    </div>
                    ${linksHtml}
                </div>
            `
        }

        function renderReleaseRow(release, index) {
            const version = release.tag_name.replace(/^v/, '')
            const isLatest = index === 0
            const isFirstOpen = index === 0
            const assets = classifyAssets(release.assets || [])
            const hasAssets = assets.mac.length + assets.win.length + assets.linux.length > 0
            const date = new Date(release.published_at).toLocaleDateString(I18N.getLocale(), { year: 'numeric', month: 'short', day: 'numeric' })

            const columns = [
                renderPlatformColumn(PLATFORM_ICONS.mac, 'macOS', assets.mac),
                renderPlatformColumn(PLATFORM_ICONS.win, 'Windows', assets.win),
                renderPlatformColumn(PLATFORM_ICONS.linux, 'Linux', assets.linux),
            ].filter(Boolean).join('<div class="w-px bg-white/5 self-stretch hidden md:block"></div>')

            return `
                <div class="release-row">
                    <button onclick="toggleRelease(this)" class="w-full flex items-center justify-between py-5 px-2 cursor-pointer group">
                        <div class="flex items-center gap-4">
                            <span class="text-sm text-gray-500 w-16">Version</span>
                            <span class="text-lg font-bold tracking-tight">${version}</span>
                            ${isLatest ? '<span class="text-[10px] font-medium px-2 py-0.5 rounded-full bg-blue-500/10 text-blue-400 border border-blue-500/20">LATEST</span>' : ''}
                            <span class="text-xs text-gray-600">${date}</span>
                        </div>
                        <svg class="chevron-icon w-5 h-5 text-gray-600 group-hover:text-gray-400 ${isFirstOpen ? 'open' : ''}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </button>
                    <div class="expand-content ${isFirstOpen ? 'open' : ''}">
                        ${hasAssets ? `
                            <div class="flex flex-col md:flex-row gap-6 px-2 pb-6 pt-1">
                                ${columns}
                            </div>
                        ` : `
                            <div class="px-2 pb-6 pt-1 text-sm text-gray-600">${I18N.t('releases.no.assets')}</div>
                        `}
                    </div>
                </div>
            `
        }

        function toggleRelease(btn) {
            const content = btn.nextElementSibling
            const chevron = btn.querySelector('.chevron-icon')
            content.classList.toggle('open')
            chevron.classList.toggle('open')
        }

        async function init() {
            const container = document.getElementById('release-list')
            try {
                const resp = await fetch(API_URL)
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`)
                const releases = await resp.json()

                if (releases.length === 0) {
                    container.innerHTML = `<div class="text-center py-20 text-gray-600">${I18N.t('releases.empty')}</div>`
                    return
                }

                const header = `<div class="text-sm text-gray-500 mb-6">${I18N.t('releases.select')}</div>`
                const rows = releases.map((r, i) => renderReleaseRow(r, i)).join('')
                container.innerHTML = header + rows
            } catch (err) {
                console.error('Failed to fetch releases:', err)
                container.innerHTML = `
                    <div class="text-center py-20">
                        <p class="text-gray-500 mb-4">${I18N.t('releases.error')}</p>
                        <a href="https://github.com/${REPO}/releases" target="_blank" class="text-blue-400 hover:underline text-sm">
                            ${I18N.t('releases.error.link')}
                        </a>
                    </div>
                `
            }
        }

        init()

        window.addEventListener('langchange', () => init())
    </script>
</body>
</html>
